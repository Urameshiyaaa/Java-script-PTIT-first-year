    <div class="love-list">
        <h2>Danh sách Yêu thích</h2>
        <div id="favList"></div>
    </div>
    <script>
        function getFavorites() {
            return JSON.parse(localStorage.getItem('favorites') || '[]');
        }
        function setFavorites(favs) {
            localStorage.setItem('favorites', JSON.stringify(favs));
        }
        function renderFavorites() {
            const favs = getFavorites();
            const grid = document.getElementById('favList');
            grid.innerHTML = '';
            if (favs.length === 0) {
                grid.innerHTML = '<p style="color:#fff;">Chưa có bộ nào trong danh sách yêu thích.</p>';
                return;
            }
            favs.forEach((fav, idx) => {
                const div = document.createElement('div');
                div.className = 'love-item';
                div.innerHTML = `
                    <img src="${fav.img}" alt="${fav.name}" style="width:80px;height:110px;border-radius:6px;object-fit:cover;">
                    <div>
                        <h3 style="font-size:15px;margin:4px 0;"><a href="${fav.link}" target="_blank" style="color:aqua;text-decoration:none;">${fav.name}</a></h3>
                        <div style="font-size:12px;color:#ccc;margin-bottom:4px;">${fav.genres}</div>
                        <button class="remove-fav" data-idx="${idx}" style="padding:4px 10px;border-radius:5px;background:#c00;color:#fff;border:none;cursor:pointer;">Gỡ</button>
                    </div>
                `;
                grid.appendChild(div);
            });
            // Gắn sự kiện cho nút Gỡ
            grid.querySelectorAll('.remove-fav').forEach(btn => {
                btn.onclick = function() {
                    const idx = +btn.getAttribute('data-idx');
                    const favs = getFavorites();
                    favs.splice(idx, 1);
                    setFavorites(favs);
                    renderFavorites();
                };
            });
        }
        renderFavorites();

        // Để đồng bộ trạng thái nút ở 1.html khi quay lại, có thể reload lại trang 1.html
        window.addEventListener('storage', function(e) {
            if (e.key === 'favorites') renderFavorites();
        });
    </script>
